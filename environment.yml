name: highfold_c2c
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - pandas
  - biopython
  - pip
  - pip:
    # C2C dependencies (PyTorch + Transformers for T5 model)
    - torch --index-url https://download.pytorch.org/whl/cu128
    - transformers
    # Service dependencies
    - fastapi>=0.100.0
    - uvicorn[standard]>=0.22.0
    - psycopg2-binary>=2.9.0
    - aiohttp>=3.9.0
    - python-dotenv>=1.0.0
    - pyyaml>=6.0
    - tqdm
    # Dev dependencies
    - pytest>=7.0
    - pytest-asyncio>=0.21
    - pytest-cov>=4.0
    - ruff>=0.1.0
