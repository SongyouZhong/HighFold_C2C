# ============================================================
# HighFold-C2C Docker Compose
# ============================================================
# This compose file deploys ONLY the HighFold-C2C application.
# It connects to EXTERNAL services already running on the host:
#   - PostgreSQL (default: host port 5432)
#   - SeaweedFS  (default: host port 8888)
#
# Usage:
#   docker compose --env-file ../.env up -d        # start app
#   docker compose --env-file ../.env down          # stop app
#   docker compose --env-file ../.env logs -f       # view logs
#
# GPU support requires the NVIDIA Container Toolkit.

services:
  # ── HighFold-C2C Application ─────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database (external PostgreSQL on host)
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME: ${DB_NAME:-mydatabase}
      DB_POOL_MIN: ${DB_POOL_MIN:-1}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      # SeaweedFS (external on host)
      SEAWEED_API_TYPE: ${SEAWEED_API_TYPE:-filer}
      SEAWEED_FILER_ENDPOINT: ${SEAWEED_FILER_ENDPOINT:-http://host.docker.internal:8888}
      SEAWEED_BUCKET: ${SEAWEED_BUCKET:-astramolecula}
      # Task processing
      TASK_QUERY_INTERVAL: ${TASK_QUERY_INTERVAL:-180}
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-2}
      # HighFold defaults
      C2C_CHECKPOINT_PATH: /app/checkpoints/c2c_model.pt
      COLABFOLD_BIN: ${COLABFOLD_BIN:-/usr/local/bin/colabfold_batch}
      # Paths
      TEMP_DIR: /tmp/highfold_c2c
      LOG_DIR: /tmp/highfold_c2c/logs
    ports:
      - "${APP_PORT:-8003}:8003"
    volumes:
      - logs:/tmp/highfold_c2c/logs
      - temp:/tmp/highfold_c2c
      - colabfold_cache:/root/.cache/colabfold
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  logs:
  temp:
  colabfold_cache:
